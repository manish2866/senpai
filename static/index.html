<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SenpAI — Your AI Tutor</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- Syntax highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>

<body>
  <div id="app">

    <!-- ── Mobile overlay ── -->
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- ── SIDEBAR ── -->
    <div id="sidebar">
      <div id="sidebar-top">
        <span class="logo" onclick="newChat()">SenpAI</span>
        <button class="icon-btn" onclick="newChat()" title="New chat">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 5v14M5 12h14" />
          </svg>
        </button>
      </div>

      <button id="new-chat-btn" onclick="newChat()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
        </svg>
        New chat
      </button>

      <div id="sidebar-history-label">Recent</div>
      <div id="history-list"></div>
      <div id="sidebar-footer">SenpAI · Powered by Groq</div>
    </div>

    <!-- ── Mobile header ── -->
    <div id="mobile-header">
      <button class="icon-btn" onclick="openSidebar()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <span style="font-size:16px;font-weight:700;color:#fff">SenpAI</span>
    </div>

    <!-- ── MAIN ── -->
    <div id="main">
      <div id="chat-area">

        <!-- Welcome -->
        <div id="welcome">
          <div class="welcome-title">SenpAI</div>
          <p class="welcome-sub">Your Socratic mentor for engineering interviews</p>
          <div class="welcome-badge">
            <span>✦</span> Guides you to the answer — never gives it away
          </div>
          <div id="starter-grid"></div>
        </div>

        <!-- Messages -->
        <div id="messages"></div>
      </div>

      <!-- Input -->
      <div id="input-bar">
        <div id="model-selector">
          <select id="ai-model" onchange="saveModelChoice()">
            <option value="openrouter/stepfun/step-3.5-flash:free">Stepfun Flash</option>
            <option value="openrouter/deepseek/deepseek-v3.2">DeepSeek V3.2</option>
            <option value="openrouter/qwen/qwen3-coder-next">Qwen3 Coder</option>
          </select>
        </div>
        <div id="input-wrap">
          <textarea id="user-input" rows="1" placeholder="Ask SenpAI anything..."></textarea>
          <button id="send-btn" onclick="sendMessage()" title="Send">
            <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24">
              <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" />
            </svg>
          </button>
        </div>
        <div id="input-hint">
          <strong>Enter</strong> to send · <strong>Shift+Enter</strong> for new line
        </div>
      </div>
    </div>

  </div>

  <!-- ── JS modules ── -->
  <script src="/static/js/config.js"></script>
  <script src="/static/js/sessions.js"></script>
  <script src="/static/js/markdown.js"></script>
  <script src="/static/js/chat.js"></script>
  <script src="/static/js/app.js"></script>
</body>

</html>
