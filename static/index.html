<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SenpAI — Your AI Tutor</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- Syntax highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>

  <style>
    /* ── Reset & Base ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 15px;
      background: #212121;
      color: #ececec;
      overflow: hidden;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 99px;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: #171717;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.25s cubic-bezier(.4, 0, .2, 1);
      z-index: 50;
    }

    #sidebar-top {
      padding: 14px 12px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .logo:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    /* New chat button */
    #new-chat-btn {
      margin: 0 12px 8px;
      padding: 9px 14px;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.75);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.15s;
      width: calc(100% - 24px);
    }

    #new-chat-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    /* History */
    #sidebar-history-label {
      padding: 12px 20px 5px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: rgba(255, 255, 255, 0.3);
    }

    #history-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
    }

    .hist-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
      margin-bottom: 2px;
    }

    .hist-item:hover {
      background: rgba(255, 255, 255, 0.07);
    }

    .hist-item.active {
      background: rgba(255, 255, 255, 0.1);
    }

    .hist-icon {
      width: 28px;
      height: 28px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .hist-label {
      flex: 1;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.65);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hist-item.active .hist-label {
      color: rgba(255, 255, 255, 0.9);
    }

    .hist-actions {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: all 0.15s;
    }

    .hist-item:hover .hist-actions {
      opacity: 1;
    }

    .hist-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .hist-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
    }

    .hist-btn.danger:hover {
      color: #f87171;
      background: rgba(248, 113, 113, 0.1);
    }

    #sidebar-footer {
      padding: 12px 20px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    /* ── Mobile overlay & header ── */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 40;
    }

    #mobile-header {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      background: #171717;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      align-items: center;
      padding: 0 12px;
      gap: 10px;
      z-index: 30;
    }

    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        transform: translateX(-100%);
      }

      #sidebar.open {
        transform: translateX(0);
      }

      #sidebar-overlay.active {
        display: block;
      }

      #mobile-header {
        display: flex;
      }

      #main {
        padding-top: 52px;
      }

      #messages {
        padding: 16px !important;
      }

      #welcome {
        padding: 20px 16px !important;
      }

      #starter-grid {
        grid-template-columns: 1fr !important;
      }

      .user-msg-inner {
        max-width: 92% !important;
      }

      #input-bar {
        padding: 10px 12px 14px !important;
      }
    }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: #212121;
      overflow: hidden;
    }

    /* ── Chat container ── */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* ── Welcome screen ── */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px 32px;
    }

    .welcome-title {
      font-size: 40px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1.5px;
      margin-bottom: 8px;
    }

    .welcome-sub {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 10px;
    }

    .welcome-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 5px 14px;
      border-radius: 99px;
      margin-bottom: 40px;
    }

    #starter-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 580px;
    }

    .starter-card {
      background: #2a2a2a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 16px 18px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }

    .starter-card:hover {
      background: #313131;
      border-color: rgba(255, 255, 255, 0.18);
      transform: translateY(-1px);
    }

    .starter-topic {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 7px;
    }

    .starter-text {
      font-size: 13.5px;
      color: rgba(255, 255, 255, 0.75);
      line-height: 1.4;
    }

    /* ── Messages ── */
    #messages {
      display: none;
      flex-direction: column;
      gap: 24px;
      padding: 32px 24px;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }

    .message {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
    }

    .message.user {
      flex-direction: row-reverse;
      padding-left: 48px;
    }

    .message.ai {
      padding-right: 48px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-in {
      animation: fadeUp 0.2s ease;
    }

    /* Avatar */
    .av {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    .av-ai {
      background: #fff;
      color: #212121;
    }

    .av-user {
      background: #555;
    }

    /* User bubble */
    .user-msg-inner {
      background: #383838;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px 18px 4px 18px;
      padding: 12px 18px;
      font-size: 14.5px;
      color: rgba(255, 255, 255, 0.95);
      line-height: 1.6;
      max-width: 100%;
      margin-left: auto;
    }

    /* AI bubble — no bg */
    .ai-msg-inner {
      flex: 1;
      min-width: 0;
      padding-top: 2px;
    }

    /* ── Typing indicator ── */
    .typing {
      display: flex;
      gap: 5px;
      padding: 6px 2px;
    }

    .t-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      animation: tdot 1.2s infinite;
    }

    .t-dot:nth-child(2) {
      animation-delay: .2s
    }

    .t-dot:nth-child(3) {
      animation-delay: .4s
    }

    @keyframes tdot {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: .4;
      }

      30% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    /* ── Quick replies ── */
    .qr-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 14px;
    }

    .qr-chip {
      padding: 5px 14px;
      border-radius: 99px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: #2a2a2a;
      color: rgba(255, 255, 255, 0.6);
      font-family: 'Inter', sans-serif;
      font-size: 12.5px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.14s;
    }

    .qr-chip:hover {
      border-color: rgba(255, 255, 255, 0.3);
      color: #fff;
      background: #333;
    }

    .qr-chip.danger {
      border-color: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.35);
    }

    .qr-chip.danger:hover {
      border-color: rgba(248, 113, 113, 0.4);
      color: #f87171;
      background: rgba(248, 113, 113, 0.07);
    }

    /* ── Markdown typography ── */
    .ai-content {
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.88);
    }

    .ai-content h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      margin: 1.8rem 0 0.75rem;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .ai-content h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #f2f2f2;
      margin: 1.5rem 0 0.6rem;
    }

    .ai-content h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.75);
      margin: 1.25rem 0 0.5rem;
    }

    .ai-content h4 {
      font-size: 0.9rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.55);
      margin: 1rem 0 0.4rem;
    }

    .ai-content p {
      margin-bottom: 0.9rem;
    }

    .ai-content p:last-child {
      margin-bottom: 0;
    }

    .ai-content ul,
    .ai-content ol {
      margin: 0.3rem 0 0.9rem 1.4rem;
    }

    .ai-content li {
      margin-bottom: 0.4rem;
    }

    .ai-content li::marker {
      color: rgba(255, 255, 255, 0.4);
    }

    .ai-content strong {
      color: #fff;
      font-weight: 600;
    }

    .ai-content em {
      color: rgba(255, 255, 255, 0.55);
    }

    .ai-content code {
      background: rgba(255, 255, 255, 0.1);
      color: #e8c97e;
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 1px 7px;
      border-radius: 5px;
      font-family: 'Fira Code', monospace;
      font-size: 12.5px;
    }

    .ai-content pre {
      background: #0d0d0d !important;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 12px;
      margin: 1rem 0;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.03);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .code-lang {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .copy-btn {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.14s;
    }

    .copy-btn:hover {
      border-color: rgba(255, 255, 255, 0.25);
      color: rgba(255, 255, 255, 0.8);
    }

    .copy-btn.copied {
      color: #4ade80;
      border-color: rgba(74, 222, 128, 0.3);
    }

    .ai-content pre code {
      background: none !important;
      border: none !important;
      padding: 14px 16px;
      display: block;
      font-size: 13px;
      line-height: 1.65;
      overflow-x: auto;
      color: inherit !important;
    }

    .ai-content blockquote {
      border-left: 3px solid rgba(255, 255, 255, 0.25);
      padding: 8px 16px;
      margin: 1rem 0;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 0 8px 8px 0;
      color: rgba(255, 255, 255, 0.5);
    }

    .ai-content hr {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      margin: 1.4rem 0;
    }

    .ai-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 13px;
    }

    .ai-content th {
      background: rgba(255, 255, 255, 0.07);
      padding: 9px 14px;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.08);
      text-align: left;
    }

    .ai-content td {
      padding: 9px 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.75);
    }

    .ai-content tr:nth-child(even) td {
      background: rgba(255, 255, 255, 0.02);
    }

    /* ── Input bar ── */
    #input-bar {
      padding: 12px 24px 18px;
      background: #212121;
    }

    #model-selector {
      max-width: 760px;
      margin: 0 auto 8px;
      display: flex;
      justify-content: flex-end;
    }

    #ai-model {
      background: #2f2f2f;
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12.5px;
      font-family: 'Inter', sans-serif;
      outline: none;
      cursor: pointer;
      transition: all 0.2s;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 8px center;
      background-size: 14px;
      padding-right: 28px;
    }

    #ai-model:hover,
    #ai-model:focus {
      border-color: rgba(255, 255, 255, 0.28);
      color: #fff;
    }

    #input-wrap {
      max-width: 760px;
      margin: 0 auto;
      background: #2f2f2f;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 12px 14px 12px 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #input-wrap:focus-within {
      border-color: rgba(255, 255, 255, 0.28);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
    }

    #user-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: rgba(255, 255, 255, 0.92);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      resize: none;
      line-height: 1.55;
      max-height: 176px;
      min-height: 22px;
    }

    #user-input::placeholder {
      color: rgba(255, 255, 255, 0.28);
    }

    #send-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.9);
      border: none;
      cursor: pointer;
      color: #212121;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    #send-btn:hover:not(:disabled) {
      background: #fff;
      transform: scale(1.05);
    }

    #send-btn:disabled {
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.3);
      cursor: not-allowed;
    }

    #input-hint {
      max-width: 760px;
      margin: 7px auto 0;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
      text-align: center;
    }

    #input-hint strong {
      color: rgba(255, 255, 255, 0.3);
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div id="app">

    <!-- ── Mobile overlay ── -->
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- ── SIDEBAR ── -->
    <div id="sidebar">
      <div id="sidebar-top">
        <span class="logo" onclick="newChat()">SenpAI</span>
        <button class="icon-btn" onclick="newChat()" title="New chat">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 5v14M5 12h14" />
          </svg>
        </button>
      </div>

      <button id="new-chat-btn" onclick="newChat()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
        </svg>
        New chat
      </button>

      <div id="sidebar-history-label">Recent</div>
      <div id="history-list"></div>
      <div id="sidebar-footer">SenpAI · Powered by Groq</div>
    </div>

    <!-- ── Mobile header ── -->
    <div id="mobile-header">
      <button class="icon-btn" onclick="openSidebar()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <span style="font-size:16px;font-weight:700;color:#fff">SenpAI</span>
    </div>

    <!-- ── MAIN ── -->
    <div id="main">
      <div id="chat-area">

        <!-- Welcome -->
        <div id="welcome">
          <div class="welcome-title">SenpAI</div>
          <p class="welcome-sub">Your Socratic mentor for engineering interviews</p>
          <div class="welcome-badge">
            <span>✦</span> Guides you to the answer — never gives it away
          </div>
          <div id="starter-grid"></div>
        </div>

        <!-- Messages -->
        <div id="messages"></div>
      </div>

      <!-- Input -->
      <div id="input-bar">
        <div id="model-selector">
          <select id="ai-model" onchange="saveModelChoice()">
            <option value="openrouter/stepfun/step-3.5-flash:free">Stepfun Flash</option>
            <option value="openrouter/deepseek/deepseek-v3.2">DeepSeek V3.2</option>
            <option value="openrouter/qwen/qwen3-coder-next">Qwen3 Coder</option>
          </select>
        </div>
        <div id="input-wrap">
          <textarea id="user-input" rows="1" placeholder="Ask SenpAI anything..."></textarea>
          <button id="send-btn" onclick="sendMessage()" title="Send">
            <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24">
              <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" />
            </svg>
          </button>
        </div>
        <div id="input-hint">
          <strong>Enter</strong> to send · <strong>Shift+Enter</strong> for new line
        </div>
      </div>
    </div>

  </div>

  <!-- ── JS modules ── -->
  <script src="/static/js/config.js"></script>
  <script src="/static/js/sessions.js"></script>
  <script src="/static/js/markdown.js"></script>
  <script src="/static/js/chat.js"></script>
  <script src="/static/js/app.js"></script>
</body>
